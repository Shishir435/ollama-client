# Local SearXNG for Ollama Client web_search.
# Endpoint for extension settings: http://localhost:8080
name: ollama-client-searxng

services:
  core:
    container_name: ollama-client-searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST:-127.0.0.1}:${SEARXNG_PORT:-8080}:${SEARXNG_PORT:-8080}"
    env_file: ./.env
    volumes:
      - ./core-config/:/etc/searxng/:rw
      - core-data:/var/cache/searxng/
    depends_on:
      - valkey

  valkey:
    container_name: ollama-client-searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data/

volumes:
  core-data:
  valkey-data:

