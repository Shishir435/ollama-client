<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microphone access</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: light-dark(#fafafa, #111);
      color: light-dark(#111, #eee);
    }
    main {
      max-width: 26rem;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 2.5rem; }
    h1 { font-size: 1.15rem; margin: 0.75rem 0 0.25rem; }
    p { font-size: 0.9rem; line-height: 1.45; opacity: 0.8; }
    button {
      margin-top: 0.75rem;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: 1px solid light-dark(#ccc, #444);
      background: light-dark(#fff, #222);
      color: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: light-dark(#f0f0f0, #2c2c2c); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <div class="icon">🎙️</div>
    <h1 id="title"></h1>
    <p id="message"></p>
    <button id="retry" class="hidden" type="button"></button>
  </main>
  <script type="module" src="./main.ts"></script>
</body>
</html>
